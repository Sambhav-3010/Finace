services:

  mongo:
    image: mongo:7
    container_name: finace-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-rag:
    build:
      context: ./python-rag
      dockerfile: Dockerfile
    container_name: finace-python-rag
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./python-rag/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=compliance_engine
    volumes:
      - ./python-rag/data:/app/data
      - ./data:/app/../data
      - ./RBI DOCS:/app/../RBI DOCS
      - rag_hf_cache:/root/.cache/huggingface
    depends_on:
      mongo:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finace-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=compliance_engine
      - FASTAPI_BASE_URL=http://python-rag:8000
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
      python-rag:
        condition: service_started

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
    container_name: finace-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5000/api/v1
    depends_on:
      - backend

volumes:
  mongo_data:
  rag_hf_cache:
